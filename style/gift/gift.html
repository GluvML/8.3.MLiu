<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="https://i.postimg.cc/qvjz8QFW/Logo.png" />
  <link rel="stylesheet" href="./style/style.css" />
  <title>Bông Hoa 8/3 💗</title>
</head>

<body class="container">
  <div id="mainContent" class="main-content">
    <div class="scene">
      <div class="mist"></div>
      <div class="stars" id="stars"></div>
      <div class="sparkles" id="sparkles"></div>
      <div class="fireflies-layer" id="fireflies"></div>
      <div class="petal-layer" id="petals"></div>
      <div class="moon"></div>

      <div class="rose-wrap side left">
        <div class="rose-glow"></div>
        <div class="rose">
          <div class="halo-ring"></div>
          <div class="stem"></div>
          <div class="leaf left one"></div>
          <div class="leaf right one"></div>
          <div class="leaf left two"></div>
          <div class="leaf right two"></div>
          <div class="bud-base"></div>
          <div class="petal p-back-left"></div>
          <div class="petal p-back-right"></div>
          <div class="petal p-mid-left"></div>
          <div class="petal p-mid-right"></div>
          <div class="petal p-front-left"></div>
          <div class="petal p-front-right"></div>
          <div class="petal p-center"></div>
          <div class="inner-swirl"></div>
        </div>
      </div>

      <div class="rose-wrap center">
        <div class="rose-glow"></div>
        <div class="rose">
          <div class="halo-ring"></div>
          <div class="stem"></div>
          <div class="leaf left one"></div>
          <div class="leaf right one"></div>
          <div class="leaf left two"></div>
          <div class="leaf right two"></div>
          <div class="bud-base"></div>
          <div class="petal p-back-left"></div>
          <div class="petal p-back-right"></div>
          <div class="petal p-mid-left"></div>
          <div class="petal p-mid-right"></div>
          <div class="petal p-front-left"></div>
          <div class="petal p-front-right"></div>
          <div class="petal p-center"></div>
          <div class="inner-swirl"></div>
        </div>
      </div>

      <div class="rose-wrap side right">
        <div class="rose-glow"></div>
        <div class="rose">
          <div class="halo-ring"></div>
          <div class="stem"></div>
          <div class="leaf left one"></div>
          <div class="leaf right one"></div>
          <div class="leaf left two"></div>
          <div class="leaf right two"></div>
          <div class="bud-base"></div>
          <div class="petal p-back-left"></div>
          <div class="petal p-back-right"></div>
          <div class="petal p-mid-left"></div>
          <div class="petal p-mid-right"></div>
          <div class="petal p-front-left"></div>
          <div class="petal p-front-right"></div>
          <div class="petal p-center"></div>
          <div class="inner-swirl"></div>
        </div>
      </div>

      <div class="ground" id="ground"></div>
    </div>
  </div>

  <audio id="pop-sound" src="./style/pop.mp3" preload="auto"></audio>
  <script src="./style/script.js"></script>
</body>
</html>
